<body>
	
<script>
	function timesTable(number) {
	for (let i = 1; i<=12; i++) 	{
		document.writeln(number + "x"+i+"="+(number*i)+"<br>");		
		}
	}
	let userNumber = Number(prompt("Type a number"));
	
	timesTable(userNumber);
	</script>

	
</body>
